version: "3.8"

services:
  the-house:
    build:
      context: ./the-house
      target: dev
      args:
        NODE_VERSION: 14.14.0
    environment:
      NODE_ENV: development
      HTTP_PORT: 8080
      HTTP_HOST: 0.0.0.0
      DEBUG: "house"
      DEBUG_HIDE_DATE: "true"
    ports:
      - 8080:8080
    volumes:
      - type: bind
        source: ./the-house/server
        target: /srv/server
    networks:
      - front-of-house

networks:
  front-of-house:
